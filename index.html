<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis Assistant</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #0b1a2a, #000);
  color: #00ffe1;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Boot */
#boot {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* Title */
h1 {
  font-size: 3rem;
}

.glow {
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00ffe1; }
  to { text-shadow: 0 0 25px #00ffe1; }
}

/* Orb */
.orb-container {
  position: relative;
  width: 200px;
  height: 200px;
}

#orb {
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, #00ffe1, #003f3a);
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 30px #00ffe1;
  transition: 0.2s;
}

.ring {
  position: absolute;
  width: 180px;
  height: 180px;
  border: 2px solid rgba(0,255,225,0.3);
  border-radius: 50%;
  top: 10px;
  left: 10px;
  animation: rotate 6s linear infinite;
}

.ring.delay {
  animation-duration: 10s;
  animation-direction: reverse;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

/* Pulse */
.pulse {
  animation: pulse 0.6s infinite alternate;
}

@keyframes pulse {
  from { transform: translate(-50%, -50%) scale(1); }
  to { transform: translate(-50%, -50%) scale(1.2); }
}

/* Status */
#status {
  margin: 15px;
}

/* Visualizer */
#visualizer {
  margin-top: 20px;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Scanlines */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    rgba(0,255,225,0.05) 0px,
    rgba(0,255,225,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
}
</style>
</head>

<body>

<div id="boot">Initializing system...</div>

<canvas id="bg"></canvas>

<h1 class="glow">JARVIS</h1>

<div class="orb-container">
  <div class="ring"></div>
  <div class="ring delay"></div>
  <div id="orb"></div>
</div>

<div id="status">Passive mode... say "Jarvis"</div>

<canvas id="visualizer" width="300" height="80"></canvas>

<script>
const status = document.getElementById("status");
const orb = document.getElementById("orb");

let isAwake = false;

/* Boot */
setTimeout(()=>{
  document.getElementById("boot").style.display="none";
},2000);

/* Typing */
function typeText(text){
  status.innerText="";
  let i=0;
  let interval=setInterval(()=>{
    status.innerText+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },25);
}

/* Speak */
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  orb.classList.add("pulse");

  speech.onend=()=>orb.classList.remove("pulse");

  speechSynthesis.speak(speech);
  typeText("Jarvis: "+text);
}

/* Commands */
function processCommand(cmd){
  if(cmd.includes("hello")) speak("Hello.");

  else if(cmd.includes("time"))
    speak("Time is "+new Date().toLocaleTimeString());

  else if(cmd.includes("date"))
    speak("Today is "+new Date().toDateString());

  else if(cmd.includes("youtube"))
    window.open("https://youtube.com");

  else if(cmd.includes("google"))
    window.open("https://google.com");

  else if(cmd.includes("whatsapp"))
    window.open("https://web.whatsapp.com");

  else if(cmd.includes("instagram"))
    window.open("https://instagram.com");

  else if(cmd.includes("play music"))
    window.open("https://youtube.com/results?search_query=music");

  else if(cmd.includes("weather"))
    window.open("https://google.com/search?q=weather");

  else if(cmd.includes("search")){
    let q=cmd.replace("search","");
    window.open("https://google.com/search?q="+q);
  }

  else if(cmd.includes("who is")||cmd.includes("what is")){
    let q=cmd.replace("who is","").replace("what is","");
    window.open("https://en.wikipedia.org/wiki/"+q);
  }

  else if(cmd.includes("calculate")){
    try{
      let r=eval(cmd.replace("calculate",""));
      speak("Result is "+r);
    }catch{
      speak("Invalid math.");
    }
  }

  else if(cmd.includes("alarm")){
    speak("Alarm set.");
    setTimeout(()=>speak("Alarm ringing."),5000);
  }

  else if(cmd.includes("shutdown")){
    speak("Shutting down.");
    document.body.innerHTML="<h1 style='color:#00ffe1'>Offline</h1>";
  }

  else speak("Command not recognized.");
}

/* Visualizer */
function startVisualizer(stream){
  let ctx=new AudioContext();
  let analyser=ctx.createAnalyser();
  let mic=ctx.createMediaStreamSource(stream);

  mic.connect(analyser);
  analyser.fftSize=64;

  let data=new Uint8Array(analyser.frequencyBinCount);
  let canvas=document.getElementById("visualizer");
  let c=canvas.getContext("2d");

  function draw(){
    requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    c.clearRect(0,0,canvas.width,canvas.height);

    let w=canvas.width/data.length;

    data.forEach((v,i)=>{
      c.fillStyle="#00ffe1";
      c.fillRect(i*w,canvas.height-v/2,w,v/2);
    });
  }
  draw();
}

/* Background particles */
const bg=document.getElementById("bg");
const bctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let particles=Array.from({length:50},()=>({
  x:Math.random()*bg.width,
  y:Math.random()*bg.height,
  vx:Math.random()-0.5,
  vy:Math.random()-0.5
}));

function animateBG(){
  bctx.clearRect(0,0,bg.width,bg.height);
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    bctx.fillStyle="#00ffe1";
    bctx.fillRect(p.x,p.y,2,2);
  });
  requestAnimationFrame(animateBG);
}
animateBG();

/* Wake word listening */
function startListening(){
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(stream=>startVisualizer(stream));

  const recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();

  recognition.continuous=true;
  recognition.lang="en-US";

  recognition.start();

  recognition.onresult=(e)=>{
    let text=e.results[e.results.length-1][0].transcript.toLowerCase();
    console.log("Heard:",text);

    if(!isAwake && text.includes("jarvis")){
      isAwake=true;
      orb.style.transform="translate(-50%, -50%) scale(1.4)";
      speak("I'm listening.");
      return;
    }

    if(isAwake){
      typeText("You said: "+text);
      processCommand(text);
      isAwake=false;
      orb.style.transform="translate(-50%, -50%) scale(1)";
    }
  };

  recognition.onerror=()=>{
    typeText("Mic error.");
  };

  recognition.onend=()=>{
    recognition.start();
  };
}

/* Start automatically */
startListening();
</script>

</body>
</html>
