<!DOCTYPE html>
<html>
<head>
  <title>Jarvis</title>
  <style>
    body {
      background: black;
      color: cyan;
      text-align: center;
      margin-top: 100px;
      font-family: Arial;
    }
    button {
      padding: 15px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>Jarvis</h1>
<button onclick="alert('Button works')">Test</button>
<p id="text"></p>

<script>
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

// Settings
recognition.continuous = true;
recognition.interimResults = false;
recognition.lang = "en-US";

// Speak function
function speak(msg) {
  let speech = new SpeechSynthesisUtterance(msg);
  window.speechSynthesis.speak(speech);
}

// Start button
function start() {
  speak("Listening");
  recognition.start();
}

// Main logic
recognition.onresult = function(event) {
  let command = event.results[event.results.length - 1][0].transcript.toLowerCase();

  console.log(command);
  document.getElementById("text").innerText = command;

  // Wake word
  if (command.includes("jarvis")) {

    let cleanCommand = command.replace("jarvis", "").trim();

    speak("Yes?");

    // Time
    if (cleanCommand.includes("time")) {
      let t = new Date().toLocaleTimeString();
      speak("The time is " + t);
    }

    // Search
    else if (
      cleanCommand.includes("search") ||
      cleanCommand.includes("google") ||
      cleanCommand.includes("find")
    ) {
      let query = cleanCommand
        .replace(/search|google|find|for|please|can you/g, "")
        .trim();

      if (query === "") {
        speak("What should I search?");
      } else {
        window.open("https://www.google.com/search?q=" + encodeURIComponent(query));
        speak("Searching for " + query);
      }
    }

    // YouTube
    else if (cleanCommand.includes("youtube")) {
      window.open("https://youtube.com");
      speak("Opening YouTube");
    }

    else {
      speak("I did not understand.");
    }
  }
};

// Keep listening
recognition.onend = function() {
  recognition.start();
};
</script>

</body>
</html>
