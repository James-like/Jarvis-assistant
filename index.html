<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis Assistant</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #0b1a2a, #000);
  color: #00ffe1;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

h1 {
  font-size: 3rem;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00ffe1; }
  to { text-shadow: 0 0 25px #00ffe1; }
}

/* Orb */
#orb {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, #00ffe1, #003f3a);
  box-shadow: 0 0 30px #00ffe1;
  margin: 20px;
  transition: 0.3s;
}

.listening {
  transform: scale(1.2);
  box-shadow: 0 0 60px #00ffe1;
}

.pulse {
  animation: pulse 0.6s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1.05); }
  to { transform: scale(1.25); }
}

/* Status */
#status {
  margin: 15px;
  font-size: 1.1rem;
}

/* Button */
button {
  padding: 12px 25px;
  font-size: 1rem;
  background: #00ffe1;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #00bba6;
}
</style>
</head>

<body>

<h1>JARVIS</h1>
<div id="orb"></div>
<div id="status">Click and say: "Jarvis + command"</div>
<button onclick="startListening()">Activate</button>

<script>
const status = document.getElementById("status");
const orb = document.getElementById("orb");

/* Typing */
function typeText(text) {
  status.innerText = "";
  let i = 0;
  let interval = setInterval(() => {
    status.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 25);
}

/* Speak */
function speak(text) {
  speechSynthesis.cancel();
  let speech = new SpeechSynthesisUtterance(text);

  orb.classList.add("pulse");
  speech.onend = () => orb.classList.remove("pulse");

  speechSynthesis.speak(speech);
  typeText("Jarvis: " + text);
}

/* Commands */
function processCommand(cmd) {

  // BASIC
  if (cmd.includes("hello"))
    speak("Hello.");

  else if (cmd.includes("time"))
    speak("The time is " + new Date().toLocaleTimeString());

  else if (cmd.includes("date"))
    speak("Today is " + new Date().toDateString());

  // WEBSITES
  else if (cmd.includes("youtube")) {
    speak("Opening YouTube");
    window.open("https://youtube.com");
  }

  else if (cmd.includes("google")) {
    speak("Opening Google");
    window.open("https://google.com");
  }

  else if (cmd.includes("whatsapp")) {
    speak("Opening WhatsApp");
    window.open("https://web.whatsapp.com");
  }

  else if (cmd.includes("instagram")) {
    speak("Opening Instagram");
    window.open("https://instagram.com");
  }

  else if (cmd.includes("gmail")) {
    speak("Opening Gmail");
    window.open("https://mail.google.com");
  }

  else if (cmd.includes("netflix")) {
    speak("Opening Netflix");
    window.open("https://netflix.com");
  }

  else if (cmd.includes("maps")) {
    speak("Opening Maps");
    window.open("https://maps.google.com");
  }

  // SEARCH
  else if (cmd.includes("search")) {
    let q = cmd.replace("search", "").trim();
    speak("Searching " + q);
    window.open("https://google.com/search?q=" + encodeURIComponent(q));
  }

  // SPOTIFY / MUSIC
  else if (cmd.includes("play song")) {
    let song = cmd.replace("play song", "").trim();

    if (song) {
      speak("Playing " + song + " on Spotify");
      window.open("https://open.spotify.com/search/" + encodeURIComponent(song));
    } else {
      speak("Tell me which song.");
    }
  }

  else if (cmd.includes("play artist")) {
    let artist = cmd.replace("play artist", "").trim();
    speak("Opening " + artist);
    window.open("https://open.spotify.com/search/" + encodeURIComponent(artist));
  }

  else if (cmd.includes("play music")) {
    speak("Opening Spotify");
    window.open("https://open.spotify.com");
  }

  // SMART PLAY (natural speech)
  else if (cmd.includes("play")) {
    let song = cmd.replace("play", "").trim();

    if (song) {
      speak("Playing " + song);
      window.open("https://open.spotify.com/search/" + encodeURIComponent(song));
    }
  }

  // CALCULATOR
  else if (cmd.includes("calculate")) {
    try {
      let result = eval(cmd.replace("calculate", ""));
      speak("The result is " + result);
    } catch {
      speak("That calculation failed.");
    }
  }

  // WIKI
  else if (cmd.includes("who is") || cmd.includes("what is")) {
    let q = cmd.replace("who is", "").replace("what is", "").trim();
    speak("Searching Wikipedia");
    window.open("https://en.wikipedia.org/wiki/" + q);
  }

  // FUN
  else if (cmd.includes("joke")) {
    speak("Why do programmers hate nature? Too many bugs.");
  }

  // ALARM
  else if (cmd.includes("alarm")) {
    speak("Alarm set.");
    setTimeout(() => speak("Alarm ringing."), 5000);
  }

  // SHUTDOWN
  else if (cmd.includes("shutdown")) {
    speak("Shutting down.");
    document.body.innerHTML = "<h1 style='color:#00ffe1'>System Offline</h1>";
  }

  else {
    speak("I did not understand that.");
  }
}

/* Listening */
function startListening() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-US";

  orb.classList.add("listening");
  status.innerText = "Listening...";

  recognition.start();

  recognition.onresult = (event) => {
    let text = event.results[0][0].transcript.toLowerCase();

    typeText("You said: " + text);
    orb.classList.remove("listening");

    if (text.includes("jarvis")) {
      let command = text.replace("jarvis", "").trim();
      processCommand(command);
    } else {
      speak("Say Jarvis before your command.");
    }
  };

  recognition.onerror = () => {
    orb.classList.remove("listening");
    status.innerText = "Mic error.";
  };
}
</script>

</body>
</html>
